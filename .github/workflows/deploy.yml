# .github/workflows/deploy.yml

name: Build, Push and Deploy to Server

# 触发条件：当 master 分支有 push 操作时
on:
  push:
    branches:
      - master
  workflow_dispatch:  # 允许手动触发
    inputs:
      mirror_service_images:
        description: "强制重新同步 PostgreSQL、Redis、Caddy 基础镜像到 ACR"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# 设置环境变量
env:
  REGISTRY: ${{ vars.ACR_REGISTRY || 'registry.cn-hangzhou.aliyuncs.com' }}
  IMAGE_OWNER: ${{ vars.ACR_NAMESPACE || github.repository_owner }}
  BACKEND_IMAGE_NAME: ${{ vars.ACR_NAMESPACE || github.repository_owner }}/rednote_backend
  FRONTEND_IMAGE_NAME: ${{ vars.ACR_NAMESPACE || github.repository_owner }}/rednote_frontend
  POSTGRES_IMAGE_NAME: ${{ vars.ACR_NAMESPACE || github.repository_owner }}/rednote_postgres
  REDIS_IMAGE_NAME: ${{ vars.ACR_NAMESPACE || github.repository_owner }}/rednote_redis
  CADDY_IMAGE_NAME: ${{ vars.ACR_NAMESPACE || github.repository_owner }}/rednote_caddy

jobs:
  # --- 任务1：构建并推送后端 Docker 镜像 ---
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate ACR configuration
        run: |
          test -n "${{ env.REGISTRY }}" || (echo "ACR_REGISTRY is required." && exit 1)
          test -n "${{ env.IMAGE_OWNER }}" || (echo "ACR_NAMESPACE is required." && exit 1)
          test -n "${{ secrets.ACR_USERNAME }}" || (echo "ACR_USERNAME secret is required." && exit 1)
          test -n "${{ secrets.ACR_PASSWORD }}" || (echo "ACR_PASSWORD secret is required." && exit 1)

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata for Backend Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Backend image digest
        run: echo "${{ steps.meta.outputs.tags }}"

  # --- 任务2：构建并推送前端 Docker 镜像 ---
  build-and-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate ACR configuration
        run: |
          test -n "${{ env.REGISTRY }}" || (echo "ACR_REGISTRY is required." && exit 1)
          test -n "${{ env.IMAGE_OWNER }}" || (echo "ACR_NAMESPACE is required." && exit 1)
          test -n "${{ secrets.ACR_USERNAME }}" || (echo "ACR_USERNAME secret is required." && exit 1)
          test -n "${{ secrets.ACR_PASSWORD }}" || (echo "ACR_PASSWORD secret is required." && exit 1)

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata for Frontend Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./packages/web-frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Frontend image digest
        run: echo "${{ steps.meta.outputs.tags }}"

  # --- 任务3：同步基础服务镜像到 ACR，避免服务器直接拉 Docker Hub ---
  mirror-service-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate ACR configuration
        run: |
          test -n "${{ env.REGISTRY }}" || (echo "ACR_REGISTRY is required." && exit 1)
          test -n "${{ env.IMAGE_OWNER }}" || (echo "ACR_NAMESPACE is required." && exit 1)
          test -n "${{ secrets.ACR_USERNAME }}" || (echo "ACR_USERNAME secret is required." && exit 1)
          test -n "${{ secrets.ACR_PASSWORD }}" || (echo "ACR_PASSWORD secret is required." && exit 1)

      - name: Log in to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Mirror missing PostgreSQL, Redis and Caddy images
        run: |
          set -e

          force_mirror="${{ github.event_name == 'workflow_dispatch' && inputs.mirror_service_images == true }}"

          mirror_image() {
            source_image="$1"
            versioned_image="$2"
            latest_image="$3"

            if [ "$force_mirror" != "true" ] && docker manifest inspect "$versioned_image" >/dev/null 2>&1; then
              echo "Image already exists: $versioned_image"
              return 0
            fi

            echo "Mirroring $source_image to $versioned_image"
            docker pull "$source_image"
            docker tag "$source_image" "$versioned_image"
            docker push "$versioned_image"

            if [ -n "$latest_image" ]; then
              docker tag "$source_image" "$latest_image"
              docker push "$latest_image"
            fi
          }

          mirror_image "postgres:16-alpine" "${{ env.REGISTRY }}/${{ env.POSTGRES_IMAGE_NAME }}:16-alpine" "${{ env.REGISTRY }}/${{ env.POSTGRES_IMAGE_NAME }}:latest"
          mirror_image "redis:7-alpine" "${{ env.REGISTRY }}/${{ env.REDIS_IMAGE_NAME }}:7-alpine" "${{ env.REGISTRY }}/${{ env.REDIS_IMAGE_NAME }}:latest"
          mirror_image "caddy:2-alpine" "${{ env.REGISTRY }}/${{ env.CADDY_IMAGE_NAME }}:2-alpine" "${{ env.REGISTRY }}/${{ env.CADDY_IMAGE_NAME }}:latest"

  # --- 任务4：在服务器上部署 ---
  deploy:
    needs: [build-and-push-backend, build-and-push-frontend, mirror-service-images]
    if: ${{ always() && needs.build-and-push-backend.result == 'success' && needs.build-and-push-frontend.result == 'success' && (needs.mirror-service-images.result == 'success' || needs.mirror-service-images.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate ACR configuration
        run: |
          test -n "${{ env.REGISTRY }}" || (echo "ACR_REGISTRY is required." && exit 1)
          test -n "${{ env.IMAGE_OWNER }}" || (echo "ACR_NAMESPACE is required." && exit 1)
          test -n "${{ secrets.ACR_USERNAME }}" || (echo "ACR_USERNAME secret is required." && exit 1)
          test -n "${{ secrets.ACR_PASSWORD }}" || (echo "ACR_PASSWORD secret is required." && exit 1)

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 30m
          script: |
            set -e

            cd "${{ secrets.TARGET_DIR }}"

            if [ -z "${{ secrets.APP_DOMAIN }}" ]; then
              echo "APP_DOMAIN secret is required for HTTPS deployment."
              exit 1
            fi

            echo "Creating docker-compose.yml..."
            cat > docker-compose.yml << 'EOF'
            services:
              # PostgreSQL Database
              postgres:
                image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${IMAGE_OWNER:-szw321127}/rednote_postgres:16-alpine
                pull_policy: missing
                container_name: rednote-postgres
                restart: unless-stopped
                environment:
                  - POSTGRES_DB=rednote
                  - POSTGRES_USER=rednote
                  - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
                  - TZ=Asia/Shanghai
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                networks:
                  - rednote-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U rednote"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              # Redis Cache
              redis:
                image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${IMAGE_OWNER:-szw321127}/rednote_redis:7-alpine
                pull_policy: missing
                container_name: rednote-redis
                restart: unless-stopped
                command: ["redis-server", "--appendonly", "yes"]
                volumes:
                  - redis-data:/data
                networks:
                  - rednote-network
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              # Backend Service
              backend:
                image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${IMAGE_OWNER:-szw321127}/rednote_backend:${IMAGE_TAG:-latest}
                container_name: rednote-backend
                restart: unless-stopped
                command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node dist/main.js"]
                # Port 3000 is only accessible internally via docker network, not exposed to host
                expose:
                  - "3000"
                environment:
                  - NODE_ENV=production
                  - CI=true
                  - PNPM_CONFIG_CONFIRM_MODULES_PURGE=false
                  - PORT=3000
                  - BACKEND_PORT=3000
                  - TZ=Asia/Shanghai
                  - DATABASE_TYPE=postgres
                  - DATABASE_HOST=postgres
                  - DATABASE_PORT=5432
                  - DATABASE_NAME=rednote
                  - DATABASE_USER=rednote
                  - DATABASE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
                  - REDIS_URL=redis://redis:6379
                  - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required and must be strong}
                  - FRONTEND_ORIGIN=https://${APP_DOMAIN:?APP_DOMAIN is required}
                  - CORS_ORIGINS=https://${APP_DOMAIN},http://frontend
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                networks:
                  - rednote-network
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s

              # Frontend Service
              frontend:
                image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${IMAGE_OWNER:-szw321127}/rednote_frontend:${IMAGE_TAG:-latest}
                container_name: rednote-frontend
                restart: unless-stopped
                expose:
                  - "3000"
                environment:
                  - TZ=Asia/Shanghai
                  - CI=true
                  - PNPM_CONFIG_CONFIRM_MODULES_PURGE=false
                  - BACKEND_AGENT_BASE_URL=http://backend:3000
                depends_on:
                  - backend
                networks:
                  - rednote-network
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode < 500 ? 0 : 1)})"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 5s

              # HTTPS Reverse Proxy
              caddy:
                image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${IMAGE_OWNER:-szw321127}/rednote_caddy:2-alpine
                pull_policy: missing
                container_name: rednote-caddy
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                environment:
                  - APP_DOMAIN=${APP_DOMAIN:?APP_DOMAIN is required}
                  - APP_IP=${APP_IP:-127.0.0.1}
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile:ro
                  - caddy-data:/data
                  - caddy-config:/config
                depends_on:
                  - frontend
                networks:
                  - rednote-network

            networks:
              rednote-network:
                driver: bridge

            volumes:
              postgres-data:
              redis-data:
              caddy-data:
              caddy-config:
            EOF

            echo "Creating Caddyfile..."
            cat > Caddyfile << 'EOF'
            {
              default_sni {$APP_IP}
            }

            {$APP_DOMAIN} {
              encode gzip zstd
              reverse_proxy frontend:3000
            }

            http://{$APP_IP} {
              encode gzip zstd
              reverse_proxy frontend:3000
            }

            https://{$APP_IP} {
              tls {
                issuer acme {
                  profile shortlived
                }
              }
              encode gzip zstd
              reverse_proxy frontend:3000
            }
            EOF

            echo "Creating .env file with configuration..."
            cat > .env << 'EOF'
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_OWNER=${{ env.IMAGE_OWNER }}
            IMAGE_TAG=${{ github.ref_name }}
            APP_DOMAIN='${{ secrets.APP_DOMAIN }}'
            APP_IP='${{ secrets.SERVER_HOST }}'
            DB_PASSWORD='${{ secrets.DB_PASSWORD }}'
            SESSION_SECRET='${{ secrets.SESSION_SECRET }}'
            EOF

            echo "Logging in to Alibaba Cloud Container Registry..."
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

            pull_app_images() {
              attempt=1
              while [ "$attempt" -le 3 ]; do
                echo "Pulling application images (attempt ${attempt}/3)..."
                if docker compose pull backend frontend; then
                  return 0
                fi
                attempt=$((attempt + 1))
                sleep 20
              done
              return 1
            }

            echo "Pulling updated application images..."
            pull_app_images

            echo "Starting application services with docker compose..."
            docker compose up -d --remove-orphans backend frontend caddy

            echo "Reloading Caddy configuration..."
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile

            echo "Cleaning up dangling images..."
            docker image prune -f

            echo "Deployment successful!"
            docker compose ps
