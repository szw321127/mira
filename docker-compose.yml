services:
  # PostgreSQL Database
  postgres:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_postgres:16-alpine
    container_name: rednote-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=rednote
      - POSTGRES_USER=rednote
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - TZ=Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rednote"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_redis:7-alpine
    container_name: rednote-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    # build:
    #   context: .
    #   dockerfile: packages/backend/Dockerfile
    # 或者使用预构建镜像（取消下面一行的注释，并注释掉上面的 build 部分）
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_backend:${IMAGE_TAG:-latest}
    container_name: rednote-backend
    restart: unless-stopped
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node dist/main.js"]
    # Port 3000 is only accessible internally via docker network, not exposed to host
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - CI=true
      - PNPM_CONFIG_CONFIRM_MODULES_PURGE=false
      - PORT=3000
      - TZ=Asia/Shanghai
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=rednote
      - DATABASE_USER=rednote
      - DATABASE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required and must be strong}
      - AI_BASE_URL_ALLOWLIST=${AI_BASE_URL_ALLOWLIST:-}
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://frontend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Service
  frontend:
    # build:
    #   context: .
    #   dockerfile: packages/web-frontend/Dockerfile
    # 或者使用预构建镜像（取消下面一行的注释，并注释掉上面的 build 部分）
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:-szw321127}/rednote_frontend:${IMAGE_TAG:-latest}
    container_name: rednote-frontend
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      - TZ=Asia/Shanghai
      - CI=true
      - PNPM_CONFIG_CONFIRM_MODULES_PURGE=false
      - BACKEND_AGENT_BASE_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - rednote-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode < 500 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  rednote-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
